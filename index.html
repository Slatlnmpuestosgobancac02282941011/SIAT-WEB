<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes"/>
  <title>Comprobante SIAT</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-color: #f4f6f9;
      --text-color: #000;
      --box-color: #fff;
      --btn-color: #143061;
      --border-light: #d9d9d9;
    }

    body.dark-mode {
      --bg-color: #121212;
      --text-color: #fff;
      --box-color: #1e1e1e;
      --btn-color: #0f356e;
      --border-light: #333;
    }

    body {
      font-family: "Poppins", Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      transition: background 0.3s, color 0.3s;
      min-height: 100vh;
      display: flex;
      flex-direction: column;

      /* 🔥 FIX IMPORTANTE */
      overflow-x: hidden;
    }

    /* ENCABEZADO */
    .header {
      background-color: var(--btn-color);
      color: white;
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }

    .header-title {
      display: flex;
      align-items: center;
      font-weight: bold;
      letter-spacing: 0.5px;
    }

    .header-title img {
      height: 55px;
      margin-right: 10px;
      max-width: 100%;
    }

    .siat-text {
      display: none;
    }

    .toggle-mode {
      background: transparent;
      border: none;
      font-size: 1.6rem;
      color: white;
      cursor: pointer;
      filter: brightness(0) invert(1);
      transition: transform 0.2s;
    }

    .toggle-mode:hover {
      transform: scale(1.1);
    }

    .titulo-principal {
      text-align: center;
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--btn-color);
      margin-top: 30px;
      margin-bottom: 20px;
      padding: 0 16px;
    }

    /* 🔥 WRAPPER CORREGIDO */
    .wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      flex: 1;
      padding: 16px;
      width: 100%;
    }

    /* 🔥 CONTAINER OPTIMIZADO */
    .container {
      width: 100%;
      max-width: 380px;
      background-color: var(--box-color);
      padding: 24px 28px;
      border-radius: 28px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
      border: 1px solid var(--border-light);
      transition: all 0.3s ease;
      margin: 0 auto;
    }

    .separator {
      border-top: 1px solid var(--border-light);
      margin: 8px 0 14px 0;
    }

    .datos-secundarios h3 {
      font-weight: 500;
      font-size: 1.05rem;
      opacity: 0.75;
      margin-bottom: 14px;
    }

    .dato {
      display: flex;
      align-items: center;
      margin: 16px 0;
    }

    .icono {
      width: 45px;
      height: 45px;
      margin-right: 14px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .dato-texto {
      display: flex;
      flex-direction: column;
      line-height: 1.3;
      flex: 1;
    }

    .dato-label {
      font-weight: 600;
      font-size: 0.85rem;
      opacity: 0.7;
    }

    .dato-value {
      font-weight: 500;
      font-size: 0.95rem;
      word-break: break-word;
    }

    .btn {
      background-color: var(--btn-color);
      color: white;
      border: none;
      padding: 12px 14px;
      width: 100%;
      border-radius: 14px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 24px;
      transition: all 0.2s ease;
    }

    .btn:hover {
      background-color: #1b4b90;
      transform: scale(0.98);
    }

    .btn img {
      width: 18px;
      height: 18px;
    }

    /* 📱 RESPONSIVE */
    @media (max-width: 480px) {
      .wrapper {
        padding: 12px;
      }

      .container {
        padding: 20px;
        margin: 0 auto;
      }

      .icono {
        width: 38px;
        height: 38px;
      }

      .dato-label {
        font-size: 0.8rem;
      }

      .dato-value {
        font-size: 0.88rem;
      }

      .btn {
        padding: 10px;
        font-size: 0.85rem;
      }
    }

    @media (max-width: 360px) {
      .container {
        padding: 16px;
      }

      .icono {
        width: 32px;
        height: 32px;
      }

      .dato {
        margin: 12px 0;
      }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-title">
      <img src="logotipo.jpeg" alt="SIAT" />
    </div>
    <button class="toggle-mode" onclick="toggleDarkMode()">🌛</button>
  </div>

  <div class="titulo-principal">Datos del Comprobante QR</div>

  <div class="wrapper">
    <div class="container" id="comprobante">

      <div class="separator"></div>

      <div class="datos-secundarios">
        <h3>Datos del Comprobante</h3>
      </div>

      <div class="dato">
        <img src="usuario.jpeg" class="icono" />
        <div class="dato-texto">
          <div class="dato-label">Razón Social</div>
          <div class="dato-value">ENCARNA PACO VDA. DE JULIAN</div>
        </div>
      </div>

      <div class="dato">
        <img src="papel.jpeg" class="icono" />
        <div class="dato-texto">
          <div class="dato-label">NIT</div>
          <div class="dato-value">2591552018</div>
        </div>
      </div>

      <div class="dato">
        <img src="pantallau.jpeg" class="icono" />
        <div class="dato-texto">
          <div class="dato-label">Número de Trámite</div>
          <div class="dato-value">—</div>
        </div>
      </div>

      <div class="dato">
        <img src="moneda.jpeg" class="icono" />
        <div class="dato-texto">
          <div class="dato-label">Monto Total Bs.</div>
          <div class="dato-value">906</div>
        </div>
      </div>

      <div class="dato">
        <img src="dolar.jpeg" class="icono" />
        <div class="dato-texto">
          <div class="dato-label">Monto Total Sus.</div>
          <div class="dato-value">0</div>
        </div>
      </div>

      <div class="dato">
        <img src="maleta.jpeg" class="icono" />
        <div class="dato-texto">
          <div class="dato-label">Fecha Pago</div>
          <div class="dato-value">12/11/2025</div>
        </div>
      </div>

      <div class="dato">
        <img src="carne.jpeg" class="icono" />
        <div class="dato-texto">
          <div class="dato-label">Estado</div>
          <div class="dato-value">PAGADO</div>
        </div>
      </div>

      <button class="btn" onclick="abrirPDF()">
        <img src="impresora.jpg" />
        IMPRIMIR COMPROBANTE PAGO
      </button>

    </div>
  </div>

  <script>
    function toggleDarkMode() {
      document.body.classList.toggle('dark-mode');
      const icon = document.querySelector('.toggle-mode');
      icon.innerText = document.body.classList.contains('dark-mode') ? '☀️' : '🌛';
    }

    function abrirPDF() {
      window.open('comprofdp.pdf', '_blank');
    }
  </script>

</body>
</html>
