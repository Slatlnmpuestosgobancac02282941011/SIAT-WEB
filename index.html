<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Comprobante SIAT</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-color: #f4f6f9;
      --text-color: #000;
      --box-color: #fff;
      --btn-color: #143061;
      --border-light: #d9d9d9;
    }

    body.dark-mode {
      --bg-color: #121212;
      --text-color: #fff;
      --box-color: #1e1e1e;
      --btn-color: #0f356e;
      --border-light: #333;
    }

    body {
      font-family: "Poppins", Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    .header {
      background-color: var(--btn-color);
      color: white;
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-title img {
      height: 55px;
      max-width: 100%;
    }

    /* 🌙 LUNA BLANCA REAL (SVG) */
    .toggle-mode {
      background: transparent;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
    }

    .toggle-mode svg {
      width: 26px;
      height: 26px;
      fill: white;
    }

    .titulo-principal {
      text-align: center;
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--btn-color);
      margin-top: 20px;
      margin-bottom: 10px;
      padding: 0 16px;
    }

    .wrapper {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 0;
      width: 100%;
    }

    .container {
      width: 100%;
      max-width: 380px;
      background-color: var(--box-color);
      padding: 18px 20px 22px 20px; /*AQUI MODIFICAS CONTENEDOR*/
      border-radius: 28px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
      border: 1px solid var(--border-light);
      margin-top: 0;
    }

    .separator {
      border-top: 1px solid var(--border-light);
      margin: 6px 0 12px 0;
    }

    .datos-secundarios h3 {
      font-size: 1.05rem;
      opacity: 0.75;
      margin-bottom: 10px;
    }

    .dato {
      display: flex;
      align-items: center;
      margin: 14px 0;
    }

    .icono {
      width: 42px;
      height: 42px;
      margin-right: 12px;
      object-fit: contain;
    }

    .dato-texto {
      display: flex;
      flex-direction: column;
    }

    .dato-label {
      font-weight: 600;
      font-size: 0.85rem;
      opacity: 0.7;
    }

    .dato-value {
      font-size: 0.95rem;
    }

    /* 🔥 BOTÓN AJUSTADO */
    .btn {
      background-color: var(--btn-color);
      color: white;
      border: none;
      padding: 12px;
      width: 92%; /* 🔥 más largo pero deja espacio */
      border-radius: 14px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      margin: 20px auto 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn img {
      width: 16px;
      height: 16px;
    }

    @media (max-width: 480px) {
      .container {
        padding: 18px;
      }

      .icono {
        width: 36px;
        height: 36px;
      }

      .dato-value {
        font-size: 0.88rem;
      }
    }
  </style>
</head>

<body>

  <div class="header">
    <div class="header-title">
      <img src="logotipo.jpeg" alt="SIAT" />
    </div>

    <!-- 🌙 ICONO BLANCO SVG -->
    <button class="toggle-mode" onclick="toggleDarkMode()">
      <svg viewBox="0 0 24 24">
        <path d="M21 12.79A9 9 0 0111.21 3
                 7 7 0 1019 21a9 9 0 002-8.21z"/>
      </svg>
    </button>
  </div>

  <div class="titulo-principal">Datos del Comprobante
     QR</div>

  <div class="wrapper">
    <div class="container">

      <div class="separator"></div>

      <div class="datos-secundarios">
        <h3>Datos del Comprobante</h3>
      </div>

      <div class="dato">
        <img src="usuario.jpeg" class="icono">
        <div class="dato-texto">
          <div class="dato-label">Razón Social</div>
          <div class="dato-value">ENCARNA PACO VDA. DE JULIAN</div>
        </div>
      </div>

      <div class="dato">
        <img src="papel.jpeg" class="icono">
        <div class="dato-texto">
          <div class="dato-label">NIT</div>
          <div class="dato-value">2591552018</div>
        </div>
      </div>

      <div class="dato">
        <img src="pantallau.jpeg" class="icono">
        <div class="dato-texto">
          <div class="dato-label">Número de Trámite</div>
          <div class="dato-value">—</div>
        </div>
      </div>

      <div class="dato">
        <img src="moneda.jpeg" class="icono">
        <div class="dato-texto">
          <div class="dato-label">Monto Total Bs.</div>
          <div class="dato-value">906</div>
        </div>
      </div>

      <div class="dato">
        <img src="dolar.jpeg" class="icono">
        <div class="dato-texto">
          <div class="dato-label">Monto Total Sus.</div>
          <div class="dato-value">0</div>
        </div>
      </div>

      <div class="dato">
        <img src="maleta.jpeg" class="icono">
        <div class="dato-texto">
          <div class="dato-label">Fecha Pago</div>
          <div class="dato-value">12/11/2025</div>
        </div>
      </div>

      <div class="dato">
        <img src="carne.jpeg" class="icono">
        <div class="dato-texto">
          <div class="dato-label">Estado</div>
          <div class="dato-value">PAGADO</div>
        </div>
      </div>

      <button class="btn" onclick="abrirPDF()">
        <img src="impresora.jpg" alt="">
        IMPRIMIR COMPROBANTE PAGO
      </button>

    </div>
  </div>

  <script>
    function toggleDarkMode() {
      document.body.classList.toggle('dark-mode');
    }

    function abrirPDF() {
      window.open('comprofdp.pdf', '_blank');
    }
  </script>

</body>
</html>
