<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Comprobante SIAT</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-color: #f4f6f9;
      --text-color: #000;
      --box-color: #fff;
      --btn-color: #143061;
    }

    body.dark-mode {
      --bg-color: #121212;
      --text-color: #fff;
      --box-color: #1e1e1e;
      --btn-color: #0f356e;
    }

    body {
      font-family: "Poppins", Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    .header {
      background-color: var(--btn-color);
      color: white;
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }

    .header-title {
      display: flex;
      align-items: center;
    }

    .header-title img {
      height: 55px;
      margin-right: 10px;
    }

    .siat-text {
      display: none;
    }

    .toggle-mode {
      background: transparent;
      border: none;
      font-size: 1.6rem;
      color: white;
      cursor: pointer;
      filter: brightness(0) invert(1);
    }

    /* TÍTULO CENTRADO */
    .titulo-principal {
      text-align: center;
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--btn-color);
      margin: 30px 0 20px 0;
    }

    /* CONTENEDOR CENTRADO - ESTILO COMO EN LA FOTO */
    .contenedor-centrado {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 360px;
      background-color: var(--box-color);
      padding: 20px 24px;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      border: 1px solid #e0e0e0;
    }

    /* LÍNEA SEPARADORA */
    .separator {
      border-top: 1px solid #ddd;
      margin: 5px 0 15px 0;
    }

    /* TÍTULO DATOS DEL COMPROBANTE */
    .datos-titulo {
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 16px;
      color: var(--text-color);
    }

    /* CADA DATO */
    .dato {
      display: flex;
      margin-bottom: 14px;
      line-height: 1.4;
    }

    .dato-label {
      width: 140px;
      font-weight: 500;
      font-size: 0.9rem;
      color: var(--text-color);
      opacity: 0.75;
    }

    .dato-value {
      flex: 1;
      font-weight: 500;
      font-size: 0.9rem;
      color: var(--text-color);
      word-break: break-word;
    }

    /* BOTÓN */
    .btn {
      background-color: var(--btn-color);
      color: white;
      border: none;
      padding: 12px;
      width: 100%;
      border-radius: 30px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 20px;
      letter-spacing: 0.5px;
    }

    .btn:hover {
      background-color: #1b4b90;
    }

    .btn img {
      width: 16px;
      height: 16px;
    }

    /* RESPONSIVE */
    @media (max-width: 450px) {
      .container {
        max-width: 320px;
        padding: 16px 18px;
      }
      .dato-label {
        width: 120px;
        font-size: 0.85rem;
      }
      .dato-value {
        font-size: 0.85rem;
      }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-title">
      <img src="logotipo.jpeg" alt="SIAT" />
      <span class="siat-text">SIAT</span>
    </div>
    <button class="toggle-mode" onclick="toggleDarkMode()">🌛</button>
  </div>

  <div class="titulo-principal">Datos del Comprobante QR</div>

  <div class="contenedor-centrado">
    <div class="container">
      <div class="separator"></div>
      <div class="datos-titulo">Datos del Comprobante</div>

      <div class="dato">
        <div class="dato-label">Razón Social</div>
        <div class="dato-value">ENCARNA PACO VDA. DE JULIAN</div>
      </div>

      <div class="dato">
        <div class="dato-label">NIT</div>
        <div class="dato-value">2591552018</div>
      </div>

      <div class="dato">
        <div class="dato-label">Número de Trámite</div>
        <div class="dato-value">—</div>
      </div>

      <div class="dato">
        <div class="dato-label">Monto Total Bs.</div>
        <div class="dato-value">906</div>
      </div>

      <div class="dato">
        <div class="dato-label">Monto Total Sus.</div>
        <div class="dato-value">0</div>
      </div>

      <div class="dato">
        <div class="dato-label">Fecha Pago</div>
        <div class="dato-value">12/11/2025</div>
      </div>

      <div class="dato">
        <div class="dato-label">Estado</div>
        <div class="dato-value">PAGADO</div>
      </div>

      <button class="btn" onclick="abrirPDF()">
        <img src="impresora.jpg" alt="Imprimir" />
        IMPRIMIR COMPROBANTE PAGO
      </button>
    </div>
  </div>

  <script>
    function toggleDarkMode() {
      document.body.classList.toggle('dark-mode');
      const icon = document.querySelector('.toggle-mode');
      icon.innerText = document.body.classList.contains('dark-mode') ? '☀️' : '🌛';
    }

    function abrirPDF() {
      window.open('comprofdp.pdf', '_blank');
    }
  </script>
</body>
</html>
